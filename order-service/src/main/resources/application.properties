spring.application.name=order-service
spring.datasource.url=jdbc:postgresql://localhost:5432/orderdb
spring.datasource.username=orderuser
spring.datasource.password=orderpass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
app.ai.provider=ollama
app.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
app.ai.ollama.model=${OLLAMA_MODEL:qwen2.5:3b}
app.ai.ollama.temperature=0.2
app.ai.enabled=true